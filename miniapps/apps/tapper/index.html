<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Yshi Taps</title>
    <style>
      :root {
        --bg: #0e1117;
        --card: #1a2030;
        --accent: #f5b23c;
        --accent2: #f2762a;
        --text: #e8ecf4;
        --muted: #8b94a8;
        --good: #4ade80;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: hidden;
        user-select: none;
        touch-action: manipulation;
      }
      #app { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 480px; height: 100%; padding: 16px; }
      .top { width: 100%; display: flex; justify-content: space-between; align-items: center; }
      .who { color: var(--muted); font-size: 13px; }
      .streak { font-size: 13px; color: var(--accent); }
      .balance { font-size: 44px; font-weight: 800; margin: 12px 0 2px; display: flex; align-items: center; gap: 8px; }
      .balance small { font-size: 16px; color: var(--muted); font-weight: 500; }
      #coin {
        margin: 20px 0;
        width: min(62vw, 260px);
        height: min(62vw, 260px);
        border-radius: 50%;
        border: none;
        cursor: pointer;
        font-size: 88px;
        background: radial-gradient(circle at 32% 28%, #ffd97a, var(--accent) 55%, var(--accent2));
        box-shadow: 0 10px 40px rgba(245, 178, 60, 0.35), inset 0 -8px 20px rgba(0,0,0,0.25);
        transition: transform 0.05s;
      }
      #coin:active { transform: scale(0.96); }
      .energy { width: 100%; margin: 8px 0 14px; }
      .energy .bar { height: 10px; background: var(--card); border-radius: 6px; overflow: hidden; }
      .energy .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 100%; }
      .energy .label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 4px; }
      .upgrades { width: 100%; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
      .upg {
        display: flex; justify-content: space-between; align-items: center;
        background: var(--card); border: none; color: var(--text);
        border-radius: 12px; padding: 12px 14px; cursor: pointer; font: inherit; text-align: left;
      }
      .upg:disabled { opacity: 0.45; cursor: default; }
      .upg .name { font-weight: 700; }
      .upg .desc { font-size: 12px; color: var(--muted); }
      .upg .cost { font-weight: 700; color: var(--accent); white-space: nowrap; }
      .upg .lvl { font-size: 11px; color: var(--muted); text-align: right; }
      #float-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
      .float {
        position: absolute; font-weight: 800; color: var(--good); font-size: 22px;
        animation: rise 0.8s ease-out forwards;
      }
      @keyframes rise { to { transform: translateY(-90px); opacity: 0; } }
      .toast {
        position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
        background: var(--card); padding: 10px 18px; border-radius: 10px;
        border: 1px solid var(--accent); font-size: 14px; z-index: 10;
        animation: fadeout 3s forwards;
      }
      @keyframes fadeout { 0%, 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="float-layer"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
