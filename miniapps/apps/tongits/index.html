<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Tongits</title>
    <style>
      :root {
        --felt: #14532d;
        --felt-dark: #0c3b1f;
        --card-bg: #fbfbf6;
        --red: #c0392b;
        --black: #1f2733;
        --gold: #f5b23c;
        --text: #eef2ea;
        --panel: rgba(0, 0, 0, 0.28);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body, #root { height: 100%; }
      body {
        background: radial-gradient(ellipse at 50% 30%, var(--felt), var(--felt-dark));
        color: var(--text);
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        user-select: none;
        overflow: hidden;
      }
      #root { display: flex; flex-direction: column; max-width: 560px; margin: 0 auto; }

      .menu { display: flex; flex-direction: column; gap: 12px; align-items: center; justify-content: center; height: 100%; padding: 24px; }
      .menu h1 { font-size: 42px; letter-spacing: 1px; }
      .menu h1 span { color: var(--gold); }
      .menu input {
        width: 100%; max-width: 300px; padding: 12px 14px; border-radius: 10px; border: none;
        font: inherit; text-align: center; background: var(--panel); color: var(--text);
        outline: 1px solid rgba(255,255,255,0.2);
      }
      .btn {
        width: 100%; max-width: 300px; padding: 13px 16px; border-radius: 12px; border: none;
        font: inherit; font-weight: 700; cursor: pointer; background: var(--gold); color: #3a2a05;
      }
      .btn.ghost { background: var(--panel); color: var(--text); outline: 1px solid rgba(255,255,255,0.25); }
      .btn:disabled { opacity: 0.45; cursor: default; }
      .row { display: flex; gap: 8px; width: 100%; max-width: 300px; }
      .err { color: #ffb4a8; font-size: 13px; min-height: 18px; }

      .table { display: flex; flex-direction: column; height: 100%; padding: 10px 10px 14px; gap: 6px; }
      .opps { display: flex; gap: 8px; }
      .opp { flex: 1; background: var(--panel); border-radius: 12px; padding: 8px; font-size: 12px; }
      .opp.active { outline: 2px solid var(--gold); }
      .opp .nm { font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; }
      .mid { display: flex; align-items: center; justify-content: center; gap: 18px; flex: 0 0 auto; padding: 8px 0; }
      .stock { text-align: center; font-size: 12px; opacity: 0.9; }
      .stock .back {
        width: 52px; height: 72px; border-radius: 8px; margin: 0 auto 4px;
        background: repeating-linear-gradient(45deg, #7a1f1f, #7a1f1f 6px, #942828 6px, #942828 12px);
        border: 2px solid #d9c9a3;
      }
      .status { font-size: 13px; text-align: center; min-height: 18px; opacity: 0.95; }
      .melds { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
      .meld { display: flex; gap: 2px; background: var(--panel); padding: 4px; border-radius: 8px; cursor: pointer; }
      .hand { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 6px 0; }
      .card {
        width: 46px; height: 66px; background: var(--card-bg); border-radius: 7px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-weight: 800; font-size: 16px; cursor: pointer; color: var(--black);
        box-shadow: 0 2px 5px rgba(0,0,0,0.35); transition: transform 0.08s;
      }
      .card.red { color: var(--red); }
      .card.sel { transform: translateY(-10px); outline: 3px solid var(--gold); }
      .card.mini { width: 30px; height: 42px; font-size: 11px; border-radius: 5px; box-shadow: none; }
      .card .suit { font-size: 14px; }
      .card.mini .suit { font-size: 10px; }
      .actions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
      .actions .btn { width: auto; max-width: none; padding: 10px 14px; font-size: 14px; }
      .overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex;
        align-items: center; justify-content: center; z-index: 20;
      }
      .modal { background: #17351f; border-radius: 16px; padding: 22px; text-align: center; max-width: 320px; width: 88%; display: flex; flex-direction: column; gap: 12px; }
      .modal h2 { color: var(--gold); }
      .modal table { width: 100%; font-size: 14px; border-collapse: collapse; }
      .modal td { padding: 4px 6px; text-align: left; }
      .modal td:last-child { text-align: right; }
      .you { font-size: 12px; opacity: 0.85; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
